services:
  mongo:
    image: docker.io/library/mongo:7
    container_name: openoma-mongo
    ports:
      - "27018:27017"
    volumes:
      - openoma-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: openoma
    restart: unless-stopped
    stop_grace_period: 10s

  server:
    build:
      context: ..
      dockerfile: openoma-server/Containerfile
    container_name: openoma-server
    environment:
      OPENOMA_MONGO_URI: "mongodb://mongo:27017"
      OPENOMA_MONGO_DB: "openoma"
    depends_on:
      - mongo
    restart: unless-stopped
    stop_grace_period: 15s

  ui:
    build:
      context: ui
      dockerfile: Containerfile
    container_name: openoma-ui
    ports:
      - "8088:8088"
    depends_on:
      - server
    restart: unless-stopped
    stop_grace_period: 5s

volumes:
  openoma-mongo-data:
