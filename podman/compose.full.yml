services:
  mongodb:
    image: docker.io/library/mongo:7
    container_name: openoma-mongodb
    environment:
      MONGO_INITDB_DATABASE: openoma
    volumes:
      - openoma-mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: podman/Dockerfile.backend
    container_name: openoma-backend
    environment:
      OPENOMA_MONGODB_URI: mongodb://mongodb:27017
    depends_on:
      - mongodb
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: podman/Dockerfile.ui
    container_name: openoma-ui
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  openoma-mongo-data:
