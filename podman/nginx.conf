server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /graphql to the backend — WebSocket-capable for subscriptions.
    # The UI client connects here directly (same path as in dev mode).
    location /graphql {
        proxy_pass http://backend:8000/graphql;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Proxy /api/* to the backend, stripping the /api prefix.
    # e.g. GET /api/graphql  →  backend GET /graphql
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve the SPA — fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
